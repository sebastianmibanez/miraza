# render.yaml — Render Blueprint
# Conecta tu repo de GitHub a Render y esto configura todo automáticamente.
# Docs: https://docs.render.com/blueprint-spec

services:
  # Web service (Flask app)
  - type: web
    name: miraza
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd frontend && npm ci && npm run build && cd .. && pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_DEBUG
        value: false
      # Firma los JWT y las sesiones del panel admin. Render lo genera solo.
      - key: SECRET_KEY
        generateValue: true
      # Connection string de Neon. Se pega a mano en el dashboard de Render
      # (Environment → Add Environment Variable). Sin esto la app usaría SQLite
      # sobre el disco efímero de Render y se perderían todos los datos.
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false


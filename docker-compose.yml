# docker-compose.yml — Desarrollo local con React + Flask
services:
  backend:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./database:/app/database
    environment:
      - FLASK_DEBUG=false
      # Sin DATABASE_URL = usa SQLite automáticamente
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: node:18-alpine
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

